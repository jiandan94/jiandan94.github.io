<div class="article-meta">
<h1><span class="title">久雨初晴有感</span></h1>

<h2 class="date">2018/11/01</h2>
</div>

<main>
<p>远山疏林轻雾笼，暖阳探窗听晨钟。</p>
<p>庭前初落银杏雨，芳华凋零又几重。</p>
<p>不期秋霜侵柳绿，可怜金风老梧桐。</p>
<p>昨日阆苑尚新蕊，行人行色行匆匆。</p>

</main>
