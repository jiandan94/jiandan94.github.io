<div class="article-meta">
<h1><span class="title">夜雨清明</span></h1>

<h2 class="date">2018/04/04</h2>
</div>

<main>
<p>惊雷起，</p>
<p>一霎清明夜雨袭。</p>
<p>帘外风轻，</p>
<p>潺潺春语，</p>
<p>入梦浇睡意。</p>
<p>心思尽去残花里。</p>
<p>流水无情空悲寂。</p>
<p>明朝晓看红湿处，</p>
<p>杨柳依依，</p>
<p>梨花风起，</p>
<p>愁染缙纭堤。</p>

</main>
