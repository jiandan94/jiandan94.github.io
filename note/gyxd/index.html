<h1><span class="title">过银杏道</span></h1>

<h2 class="date">2016/10/26</h2>
</div>

<main>
<p>银杏叶黄暑气收，</p>
<p>天凉月高怕登楼。</p>
<p>怕登楼。</p>
<p>一见鸿书销眉愁。</p>
<p>夜浣碧纱掩薄秋，</p>
<p>累君多奔走，</p>
<p>愿撷晚霞作兰舟。</p>
<p>君言舟摇珠帘招，</p>
<p>风也飘飘雨潇潇。</p>
<p>雨潇潇。</p>
<p>赌书廊前有陈雕。</p>
<p>我抱长琴在虹桥，</p>
<p>银字流水调，</p>
<p>不教红樱负绿蕉。</p>

</main>
