<div class="article-meta">
<h1><span class="title">冬日过缙纭堤</span></h1>

<h2 class="date">2016/11/22</h2>
</div>

<main>
<p>渝州冬早立，近日尚秋衣。</p>
<p>今明披绣闼，始觉冬意袭。</p>
<p>瑟瑟西风浸，萧萧梧叶稀。</p>
<p>是处斑驳景，唯独缙纭堤。</p>
<p>擎伞盖已去，漏春仍昨夕。</p>
<p>相对相忘言，只道无和羲。</p>

</main>
