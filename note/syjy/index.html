<div class="article-meta">
<h1><span class="title">松园记雨</span></h1>

<h2 class="date">2016/06/02</h2>
</div>

<main>
<p>骤雨如烟喧小楼，</p>
<p>群芳摇落意无休。</p>
<p>望断巴山犹未尽，</p>
<p>点点雨丝点点愁。</p>
