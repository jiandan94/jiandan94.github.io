<h1><span class="title">偶遇秋雨</span></h1>

<h2 class="date">2019/11/25</h2>
</div>

<main>
<p>远行不经意，归途暮雨袭。</p>
<p>阑风入沉阁，竹斋听雨息。</p>
<p>乱蝉声渐渐，梧桐叶槭槭。</p>
<p>雁阵来时路，年年有归期。</p>
