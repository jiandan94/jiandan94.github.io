<h1><span class="title">初雪</span></h1>

<h2 class="date">2016/01/22</h2>
</div>

<main>
<p>北风呼号雪飘飘，一人在家甚无聊。</p>
<p>前日刚说有雨雪，明朝又要防寒潮。</p>
<p>漫将闲书消冷寂，且煮陈茶度寒宵。</p>
<p>无意庭院凄风紧，腊梅残落竟逍遥。</p>

</main>
