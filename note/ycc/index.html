<div class="article-meta">
<h1><span class="title">咏曹操</span></h1>

<h2 class="date">2012/03/05</h2>
</div>

<main>
<blockquote>
<p>2012年，读高二的我看到高三学长和学姐在举行“百日誓师大会”。他们的喊声不由得触动了我，让我对未来很是憧憬。几日后，便写下了这首诗。</p>
</blockquote>
<p>江流浮沉风云涌，江畔何人起敛容。</p>
<p>跣足常趋握发殿，躬身频至玉蟾宫。</p>
<p>雄心勃勃扫漠北，虎视眈眈向江东。</p>
<p>待到青梅煮酒日，拔剑示君论英雄。</p>

</main>
